<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM Health — Прототип</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=10">
<style>
  html, body { height: 100%; }
  body { background: #EFE9F5; overflow: hidden; }

  /* Design-canvas-free presentation of 3 phones side by side */
  .stage {
    width: 100vw; height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 24px;
    box-sizing: border-box;
    background:
      radial-gradient(ellipse at 20% 20%, #F5E8F3 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #E4DBF4 0%, transparent 60%),
      linear-gradient(180deg, #F3EDF7 0%, #E5DCF2 100%);
  }

  .phone-wrap {
    position: relative;
  }

  .phone-label {
    text-align: center;
    font-family: 'Inter', system-ui;
    font-size: 12px;
    font-weight: 500;
    color: #7B6E95;
    letter-spacing: 0.3px;
    margin-top: 14px;
  }

  /* Stack frames should scale if viewport too small */
  @media (max-width: 1200px) {
    .stage {
      transform-origin: top left;
      transform: scale(0.78);
      width: 128.2vw;
    }
  }
  @media (max-width: 900px) {
    .stage {
      flex-direction: column;
      gap: 20px;
      height: auto;
      min-height: 100vh;
      transform: none;
      width: 100vw;
    }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/HomeScreen.jsx"></script>
<script type="text/babel" src="components/RecommendationsScreen.jsx"></script>
<script type="text/babel" src="components/LibraryScreen.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Phone({ children, label, screenLabel }) {
  return (
    <div className="phone-wrap" data-screen-label={screenLabel}>
      <IOSDevice width={380} height={780}>
        {children}
      </IOSDevice>
      <div className="phone-label">{label}</div>
    </div>
  );
}

function Toast({ text, onClose }) {
  React.useEffect(() => {
    const t = setTimeout(onClose, 1600);
    return () => clearTimeout(t);
  }, [text, onClose]);
  return (
    <div style={{
      position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
      background: 'rgba(26,22,48,0.92)', color: 'white',
      padding: '10px 18px', borderRadius: 999, fontSize: 13,
      fontFamily: 'Inter, system-ui', zIndex: 9999,
      boxShadow: '0 8px 24px rgba(0,0,0,0.2)',
    }}>{text}</div>
  );
}

function App() {
  const [homeTab, setHomeTab] = useState('home');
  const [recTab, setRecTab] = useState('home');
  const [libTab, setLibTab] = useState('lib');
  const [toast, setToast] = useState(null);

  const open = (id) => setToast('Открытие: ' + id);
  const close = () => setToast('Закрытие окна');

  return (
    <>
      <div className="stage">
        <Phone label="01  ·  Главная" screenLabel="01 Home">
          <ScreenHost tab={homeTab} setTab={setHomeTab} onOpen={open} onClose={close} />
        </Phone>
        <Phone label="02  ·  Рекомендации" screenLabel="02 Recommendations">
          <ScreenHost tab={recTab} setTab={setRecTab} onOpen={open} onClose={close} initial="home" forceRec />
        </Phone>
        <Phone label="03  ·  Библиотека" screenLabel="03 Library">
          <ScreenHost tab={libTab} setTab={setLibTab} onOpen={open} onClose={close} initial="lib" />
        </Phone>
      </div>
      {toast && <Toast text={toast} onClose={() => setToast(null)} />}
    </>
  );
}

// ScreenHost renders the screen that corresponds to the tab, with tab bar.
// Because only 3 screens are implemented, tabs that don't have screens show a
// simple placeholder but stay interactive so users can explore.
function ScreenHost({ tab, setTab, onOpen, onClose, forceRec }) {
  const activeTab = forceRec ? 'home' : tab; // rec phone pins to home tab highlight
  // Map our 3 real screens:
  //   phone 1 (home tab)  -> HomeScreen
  //   phone 2 (home tab)  -> RecommendationsScreen (conceptually a Home sub-view)
  //   phone 3 (lib tab)   -> LibraryScreen
  let content;
  if (forceRec) {
    content = <RecommendationsScreen onClose={onClose} onOpen={onOpen} />;
  } else if (tab === 'home') {
    content = <HomeScreen onClose={onClose} onOpen={onOpen} />;
  } else if (tab === 'lib') {
    content = <LibraryScreen onClose={onClose} onOpen={onOpen} />;
  } else {
    content = <Placeholder tabId={tab} />;
  }
  return (
    <div style={{ position: 'relative', height: '100%' }}>
      {content}
      <BottomNav active={activeTab} onChange={setTab} />
    </div>
  );
}

function Placeholder({ tabId }) {
  const names = { docs: 'Документы', chat: 'Чат', me: 'Профиль' };
  return (
    <div className="screen">
      <TopBar onClose={() => {}} />
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 40, textAlign: 'center' }}>
        <div>
          <div style={{ width: 64, height: 64, borderRadius: 20, margin: '0 auto 16px', background: 'var(--lavender-2)' }} />
          <div className="t-h3 c-primary">{names[tabId] || 'Скоро'}</div>
          <div className="t-body-sm c-tertiary" style={{ marginTop: 6 }}>Раздел в разработке</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
